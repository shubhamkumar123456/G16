<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .top{
            width: 700px;
            height: 100px;
            background-color: aqua;
        }
        .container{
            border: 1px solid orange;
            display: flex;
            width: 700px;
            gap: 20px;
            margin-top: 20px;
        }
        .a{
            width: 150px;
            height: 400px;
            background-color: blue;
        }
        .b{
            width: 150px;
            height: 400px;
            background-color: green;
        }
        .c{
            height: 400px;
            width: 400px;
            background-color: brown;
        }
    </style>
</head>
<body>
    <div class="top"></div>

    <div class="container">
        <div class="a"></div>
        <div class="b"></div>
        <div class="c"></div>
    </div>

    <div style="margin-top: 20px;" class="top"></div>
</body>
</html>
