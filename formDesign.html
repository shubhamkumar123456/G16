<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            height: 100vh;
            width: 100%;
            /* background-color: black; */
            background-image:linear-gradient( rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url(https://images01.nicepagecdn.com/c461c07a441a5d220e8feb1a/2cc1a632c8c5511c86638369/jhhhhhh.jpg);
            display: flex;
            padding: 40px;
            gap: 20px;
            background-repeat: no-repeat;
            background-size: cover;
        
            align-items: center;
            justify-content: center;
        }
        .left{
            width: 35%;
            height: 60%;
            color: white;
            font-size: 20px;
            /* background-color: brown; */
        }
        .right{
            width: 40%;
            height: 60%;
            color: white;
            font-weight: bolder;
            /* background-color: yellow; */
        }

        .box{
            width: 300px;
            /* height: 100px; */
            /* background-color: aqua; */
            margin-bottom: 20px;
        }

        .top{
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 25px;
        }

        .rightTop{
            display: flex;
            gap: 20px;
        }

        input, textarea{
            border: none;
            border-bottom: 2px solid white;
            background-color: transparent;
            margin-bottom: 30px;
            outline: none;
            padding: 10px;
            color: white;
            margin-top: 15px;
        }

        button{
            width: 100%;
            padding: 20px;
            border-radius: 30px;
            background-color: orange;
            border: none;
            color: white;

        }

        button:hover{
            background-color: white;
            color: black;
        }

        .mb{
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <h1 class="mb" style="font-size: 40px; font-weight: bolder;">CONTACT US</h1>
            <!-- <h1>Contact Us</h1> -->
            <p class="mb">Images from  freepik</p>

            <div class="box mb">
                <div class="top mb">
                    <div class="topLeft">
                        <i style="color: rgb(255, 191, 0);" class="bi bi-telephone-fill"></i>
                    </div>
                    <div class="topRight">
                        <h3>Call Us</h3>
                    </div>
                </div>
                <p>1 (234) 567-891, 1 (234) 987-654</p>
            </div>
            <div class="box mb">
                <div class="top mb">
                    <div class="topLeft">
                        <i style="color: rgb(255, 191, 0);" class="bi bi-geo-alt-fill"></i>
                    </div>
                    <div class="topRight">
                        <h3>Location</h3>
                    </div>
                </div>
                <p>121 Rock Sreet, 21 Avenue, New York, NY 92103-9000</p>
            </div>
            <div class="box mb">
                <div class="top mb">
                    <div class="topLeft">
                        <i style="color: rgb(255, 191, 0);" class="bi bi-stopwatch"></i>
                    </div>
                    <div class="topRight">
                        <h3>Business Hours</h3>
                    </div>
                </div>
                <p>Mon – Fri …… 10 am – 8 pm, Sat, Sun ....… Closed</p>
            </div>
        </div>

        <div class="right">
            <div  class="rightTop">
                <div style="width: 50%;" class="rightLeft">
                    <p>Email</p>
                    <input style="width: 100%;" placeholder="enter a valid email address" type="email">
                </div>
                <div style="width: 50%;" class="rightRight">
                    <p>Name</p>
                    <input style="width: 100%;" placeholder="enter your name" type="text">
                </div>
            </div>
             <p>Address</p>
            <input placeholder="Enter your address" style="width: 100%;" type="text">
             <p>Message</p>
            <textarea placeholder="enter your message" style="width: 100%; height: 100px;" name="" id=""></textarea>

            <button>Submit</button>
        </div>
    </div>

    <!-- https://meet.google.com/euj-ytjg-nrv -->
</body>
</html>
