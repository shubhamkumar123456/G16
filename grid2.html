<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container{
            width: 100%;
            height: 100vh;
            background-color: black;
            display: grid;
            gap: 10px;
            grid-template-rows: repeat(5,auto);
            /* grid-template-columns:1fr 1fr 1fr 1fr ; */
            /* grid-template-columns:auto auto auto auto ; */
            grid-template-columns:repeat(4, 1fr) ;
        }
        .box{
            background-color: yellow;
        }

        .one{
            grid-column: 1/5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box one">1</div>
        <div style="grid-row: 2/6;" class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div>
    </div>
</body>
</html>
